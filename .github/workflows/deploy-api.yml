# Build da imagem da API -> ghcr.io (grátis, imagem pública) -> atualiza o Container App.
# Secrets necessários no repositório GitHub:
#   AZURE_CREDENTIALS  (JSON do service principal: az ad sp create-for-rbac --sdk-auth)
name: deploy-api

on:
  push:
    branches: [main]
    paths: ["api/**", "models/**"]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/previsor-imoveis-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # O Dockerfile espera models/ dentro do contexto da API
      - run: cp -r models api/models

      - uses: docker/build-push-action@v6
        with:
          context: api
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Atualizar Container App
        run: |
          az containerapp update \
            --name previmoveis-api \
            --resource-group previsor-imoveis \
            --image ${{ env.IMAGE }}:${{ github.sha }}
